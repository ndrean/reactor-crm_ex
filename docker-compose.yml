services:
  postgres:
    env_file: .env-docker
    # image: pgvector/pgvector:pg18-bookworm
    image: postgres:18-bookworm
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  migrate:
    build: .
    env_file: .env-docker
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/bin/migrate
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    env_file: .env-docker
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PHX_SERVER: "true"
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env-docker
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # Replaced by Mistral Voxtral Mini (WHISPER_PROVIDER=mistral)
  # whisper:
  #   image: fedirz/faster-whisper-server:latest-cpu
  #   restart: unless-stopped
  #   environment:
  #     WHISPER__MODEL: small
  #     WHISPER__INFERENCE_DEVICE: cpu
  #   ports:
  #     - "127.0.0.1:8000:8000"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2G
  #         cpus: "2.0"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file: .env-docker
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      GF_ALERTING_ENABLED: "false"
      GF_DATAPROXY_TIMEOUT: "60"
      GF_DATAPROXY_KEEP_ALIVE_SECONDS: "30"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 1536M

volumes:
  pgdata:
  promdata:
  grafanadata:
  caddy_data:
  caddy_config:
